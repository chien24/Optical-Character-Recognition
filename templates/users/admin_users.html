{% extends 'base.html' %} {% block content %}
<h2>Admin - Users</h2>
<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Username</th>
      <th>Email</th>
      <th>Active</th>
    </tr>
  </thead>
  <tbody>
    {% for u in users %}
    <tr>
      <td>{{ u.id }}</td>
      <td>{{ u.username }}</td>
      <td>{{ u.email }}</td>
      <td>{{ u.is_active }}</td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
